<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark gray and black striped pattern -->
    <pattern id="stripePattern" patternUnits="userSpaceOnUse" width="100" height="20">
      <rect width="100" height="10" fill="#333333"/>
      <rect y="10" width="100" height="10" fill="#000000"/>
    </pattern>
    <!-- Circular clip path -->
    <clipPath id="circleClip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  
  <!-- Striped background clipped into a circle -->
  <rect width="100" height="100" fill="url(#stripePattern)" clip-path="url(#circleClip)"/>
  
  <!-- Subtle circular border outline -->
  <circle cx="50" cy="50" r="48.5" fill="none" stroke="#444444" stroke-width="3"/>
  
  <!-- Clear centered white T.K. text -->
  <text x="50" y="53" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#FFFFFF" font-weight="900">T.K.</text>
</svg>
